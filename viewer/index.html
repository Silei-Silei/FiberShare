<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiberShare Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0f0f0f; overflow: hidden; }
    body { display: flex; flex-direction: column; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #header {
      flex-shrink: 0;
      padding: 10px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #header h1 { font-size: 16px; font-weight: 600; color: #fff; }
    #badge { font-size: 11px; color: #888; background: #2a2a2a; padding: 2px 8px; border-radius: 10px; }
    #canvas-wrap { position: relative; flex: 1; min-height: 0; }
    #gl { width: 100%; height: 100%; display: block; }
    #overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: #0f0f0f;
      transition: opacity 0.3s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid #333; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #msg { font-size: 13px; color: #888; text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="header">
    <h1>FiberShare</h1>
    <span id="badge">Loading...</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="gl"></canvas>
    <div id="overlay">
      <div class="spinner" id="spinner"></div>
      <div id="msg">Loading neuroimaging data...</div>
    </div>
  </div>

  <script type="module">
    import { Niivue } from 'https://cdn.jsdelivr.net/npm/@niivue/niivue@0.69.0/+esm'

    const params = new URLSearchParams(window.location.search)
    const volumeUrl = params.get('v')   // anatomical NIfTI
    const tractUrl  = params.get('t')   // TCK/TRK tractography
    const dtiV1Url  = params.get('d')   // DTI V1 eigenvector NIfTI (4D, 3 volumes)

    const overlay  = document.getElementById('overlay')
    const spinner  = document.getElementById('spinner')
    const msg      = document.getElementById('msg')
    const badge    = document.getElementById('badge')

    function fname(url) { return url.split('/').pop().split('?')[0] }

    function showError(text) {
      spinner.style.display = 'none'
      msg.textContent = text
      badge.textContent = 'Error'
    }

    if (!volumeUrl && !dtiV1Url) {
      showError('No files specified. Share a link with ?v=<nifti_url> to load a volume.')
      badge.textContent = 'No files'
    } else {
      const canvas = document.getElementById('gl')

      const nv = new Niivue({
        backColor: [0.07, 0.07, 0.07, 1],
        show3Dcrosshair: true,
        isResizeCanvas: true,
      })
      nv.attachToCanvas(canvas)

      const volumes = []
      if (volumeUrl) volumes.push({ url: volumeUrl, name: fname(volumeUrl) })
      if (dtiV1Url)  volumes.push({ url: dtiV1Url,  name: fname(dtiV1Url) })

      const meshes = tractUrl ? [{ url: tractUrl, name: fname(tractUrl) }] : []

      try {
        await nv.loadVolumes(volumes)

        // Apply RGB direction encoding to DTI V1 volume
        if (dtiV1Url) {
          const v1idx = volumeUrl ? 1 : 0
          const ok = nv.volumes[v1idx].loadImgV1()
          if (ok) nv.updateGLVolume()
        }

        if (meshes.length > 0) await nv.loadMeshes(meshes)

        overlay.classList.add('hidden')
        const parts = []
        if (volumeUrl) parts.push(fname(volumeUrl))
        if (dtiV1Url)  parts.push(fname(dtiV1Url) + ' [V1 RGB]')
        if (tractUrl)  parts.push(fname(tractUrl))
        badge.textContent = parts.join(' + ')
      } catch (err) {
        console.error(err)
        showError('Failed to load: ' + err.message)
      }
    }
  </script>
</body>
</html>
